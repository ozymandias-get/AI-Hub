name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            dist-cmd: npm run dist
            artifact-name: AI-Hub-Windows
            upload-path: release/AI-Hub-Setup-*.exe
          - os: ubuntu-latest
            dist-cmd: npm run dist:linux
            artifact-name: AI-Hub-Linux
            upload-path: |
              release/AI-Hub-*.AppImage
              release/AI-Hub-*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2 dpkg-dev

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build & package
        run: ${{ matrix.dist-cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.upload-path }}
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: AI-Hub-Windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: AI-Hub-Linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AI Hub ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            AI-Hub-Setup-*.exe
            AI-Hub-*.AppImage
            AI-Hub-*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
