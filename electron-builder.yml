appId: com.local.aihub
productName: AI Hub
copyright: Copyright © 2026

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AI Hub
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  artifactName: AI-Hub-Setup-${version}.exe
  deleteAppDataOnUninstall: false
  runAfterFinish: true

linux:
  icon: assets/
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  artifactName: AI-Hub-${version}.${ext}
